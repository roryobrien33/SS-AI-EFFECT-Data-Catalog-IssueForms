name: Remove Concept
description: Submit a request to remove an existing concept/theme from the AI-EFFECT data catalog
title: "[REMOVE CONCEPT] "
labels:
  - remove-concept

body:
  - type: markdown
    attributes:
      value: |
        ## Remove Concept

        Use this form to request removal of an existing concept/theme from the AI-EFFECT data catalog.

        Concepts are used by datasets in the `theme` field.

        The workflow will block removal if the concept is still referenced by one or more datasets. This prevents broken dataset theme links.

        Before removing a concept, either:
        - remove the concept from all dataset theme lists, or
        - replace it with another existing concept using the Edit Dataset form.

  - type: input
    id: identifier
    attributes:
      label: Concept identifier
      description: Existing concept identifier to remove.
      placeholder: ex:forecast-data
    validations:
      required: true

  - type: input
    id: pref_label
    attributes:
      label: Concept preferred label
      description: Optional human-readable label, used only for reviewer confirmation.
      placeholder: forecast data
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Reason for removal
      description: Explain why this concept should be removed.
      placeholder: This concept was added in error or is no longer needed.
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirm concept removal
      description: Confirm that this concept should be removed from the catalog.
      options:
        - label: I confirm that this concept should be removed from the catalog.
          required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Optional maintainer notes. These will not appear on the generated webpage.
      placeholder: Any extra context for reviewers.
    validations:
      required: false
