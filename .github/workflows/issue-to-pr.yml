name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'add-dataset') ||
      contains(github.event.issue.labels.*.name, 'remove-dataset') ||
      contains(github.event.issue.labels.*.name, 'edit-dataset') ||
      contains(github.event.issue.labels.*.name, 'add-concept') ||
      contains(github.event.issue.labels.*.name, 'remove-concept') ||
      contains(github.event.issue.labels.*.name, 'add-metric') ||
      contains(github.event.issue.labels.*.name, 'remove-metric') ||
      contains(github.event.issue.labels.*.name, 'add-quality-measurement') ||
      contains(github.event.issue.labels.*.name, 'remove-quality-measurement') ||
      contains(github.event.issue.labels.*.name, 'add-policy') ||
      contains(github.event.issue.labels.*.name, 'remove-policy') ||
      contains(github.event.issue.labels.*.name, 'add-lineage-link') ||
      contains(github.event.issue.labels.*.name, 'remove-lineage-link')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("issue.txt").write_text(
              os.environ.get("ISSUE_BODY", ""),
              encoding="utf-8"
          )
          PY

      - name: Parse issue form, validate catalog, and update YAML minimally
        env:
          IS_ADD_DATASET: ${{ contains(github.event.issue.labels.*.name, 'add-dataset') }}
          IS_REMOVE_DATASET: ${{ contains(github.event.issue.labels.*.name, 'remove-dataset') }}
          IS_EDIT_DATASET: ${{ contains(github.event.issue.labels.*.name, 'edit-dataset') }}
          IS_ADD_CONCEPT: ${{ contains(github.event.issue.labels.*.name, 'add-concept') }}
          IS_REMOVE_CONCEPT: ${{ contains(github.event.issue.labels.*.name, 'remove-concept') }}
          IS_ADD_METRIC: ${{ contains(github.event.issue.labels.*.name, 'add-metric') }}
          IS_REMOVE_METRIC: ${{ contains(github.event.issue.labels.*.name, 'remove-metric') }}
          IS_ADD_QUALITY_MEASUREMENT: ${{ contains(github.event.issue.labels.*.name, 'add-quality-measurement') }}
          IS_REMOVE_QUALITY_MEASUREMENT: ${{ contains(github.event.issue.labels.*.name, 'remove-quality-measurement') }}
          IS_ADD_POLICY: ${{ contains(github.event.issue.labels.*.name, 'add-policy') }}
          IS_REMOVE_POLICY: ${{ contains(github.event.issue.labels.*.name, 'remove-policy') }}
          IS_ADD_LINEAGE_LINK: ${{ contains(github.event.issue.labels.*.name, 'add-lineage-link') }}
          IS_REMOVE_LINEAGE_LINK: ${{ contains(github.event.issue.labels.*.name, 'remove-lineage-link') }}
        run: |
          python - <<'PY'
          import copy
          import os
          import re
          import sys
          from pathlib import Path

          import yaml

          CATALOG_PATH = Path("data-catalog/data-catalog.yaml")
          ISSUE_PATH = Path("issue.txt")
          ERROR_PATH = Path("validation_errors.md")


          def fail(errors):
              if isinstance(errors, str):
                  errors = [errors]

              msg = (
                  "Catalog intake validation failed.\n\n"
                  + "\n".join(f"- {error}" for error in errors)
                  + "\n\nPlease edit the issue to fix these fields. The workflow will re-run after the issue is edited."
              )

              ERROR_PATH.write_text(msg, encoding="utf-8")
              print(msg)
              sys.exit(1)


          def clean_value(value):
              if value is None:
                  return ""

              value = str(value)

              value = (
                  value
                  .replace("\u200e", "")
                  .replace("\u200f", "")
                  .replace("\ufeff", "")
                  .replace("\u202a", "")
                  .replace("\u202b", "")
                  .replace("\u202c", "")
                  .replace("\u2066", "")
                  .replace("\u2067", "")
                  .replace("\u2068", "")
                  .replace("\u2069", "")
              )

              value = value.strip()

              if value in {"_No response_", "No response"}:
                  return ""

              return value


          def extract_field(body, label):
              pattern = rf"###\s+{re.escape(label)}\s*\n+(.*?)(?=\n###\s+|\Z)"
              match = re.search(pattern, body, re.DOTALL | re.IGNORECASE)

              if not match:
                  return ""

              return clean_value(match.group(1))


          def extract_lines(body, label):
              value = extract_field(body, label)

              if not value:
                  return []

              return [
                  clean_value(line)
                  for line in value.splitlines()
                  if clean_value(line) and clean_value(line) not in {"-", "*"}
              ]


          def slugify(value):
              value = str(value or "").lower().strip()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = re.sub(r"-+", "-", value).strip("-")
              return value or "item"


          def slug_identifier(value):
              value = str(value or "").strip()

              if ":" in value:
                  value = value.split(":", 1)[1]

              value = value.lower()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = re.sub(r"-+", "-", value).strip("-")

              return value or "item"


          def is_yes(value):
              return str(value or "").strip().lower() == "yes"


          def looks_like_url(value):
              if not value:
                  return True
              return value.startswith("http://") or value.startswith("https://")


          def looks_like_date(value):
              if not value:
                  return True
              return bool(re.match(r"^\d{4}-\d{2}-\d{2}$", value))


          def ensure_list_section(catalog, key):
              section = catalog.get(key, [])

              if section is None:
                  section = []

              if not isinstance(section, list):
                  fail(f"Expected top-level '{key}' to be a list.")

              return section


          def identifiers_in(section, id_key="identifier"):
              return {
                  str(item.get(id_key)).strip()
                  for item in section
                  if isinstance(item, dict) and item.get(id_key)
              }


          def as_list(value):
              if value is None:
                  return []

              if isinstance(value, list):
                  return [str(v).strip() for v in value if str(v).strip()]

              value = str(value).strip()
              return [value] if value else []


          def require_existing(reference, existing_ids, field_name, errors):
              if reference and reference not in existing_ids:
                  errors.append(f"{field_name} references missing identifier: {reference}")


          def require_all_existing(references, existing_ids, field_name, errors):
              missing = [ref for ref in references if ref not in existing_ids]

              if missing:
                  errors.append(
                      f"{field_name} references missing identifiers: {', '.join(missing)}"
                  )


          def dump_list_item_block(item):
              return yaml.safe_dump(
                  [item],
                  sort_keys=False,
                  allow_unicode=True,
                  width=1000,
                  default_flow_style=False,
              ).rstrip() + "\n"


          def get_section_bounds(text, section_name):
              header_pattern = re.compile(rf"^{re.escape(section_name)}:\s*$", re.MULTILINE)
              match = header_pattern.search(text)

              if not match:
                  return None

              section_start = match.end()
              next_header_pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*:\s*$", re.MULTILINE)
              next_match = next_header_pattern.search(text, section_start)

              if next_match:
                  return match.start(), next_match.start()

              return match.start(), len(text)


          def detect_section_list_indent(text, section_name):
              bounds = get_section_bounds(text, section_name)

              if not bounds:
                  return "  "

              section_abs_start, section_abs_end = bounds
              section_text = text[section_abs_start:section_abs_end]

              for line in section_text.splitlines():
                  match = re.match(r"^(\s*)-\s+", line)
                  if match:
                      return match.group(1)

              return "  "


          def indent_block(block, indent):
              lines = block.rstrip().splitlines()
              return "\n".join(
                  indent + line if line.strip() else line
                  for line in lines
              ) + "\n"


          def insert_block_into_top_level_section(text, section_name, block):
              header_pattern = re.compile(rf"^{re.escape(section_name)}:\s*$", re.MULTILINE)
              match = header_pattern.search(text)

              item_indent = detect_section_list_indent(text, section_name)
              block = indent_block(block, item_indent)

              if not match:
                  text = text.rstrip() + f"\n{section_name}:\n"
                  return text + block

              section_start = match.end()

              next_header_pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*:\s*$", re.MULTILINE)
              next_match = next_header_pattern.search(text, section_start)

              if next_match:
                  insert_pos = next_match.start()
                  before = text[:insert_pos].rstrip()
                  after = text[insert_pos:].lstrip("\n")
                  return before + "\n" + block.rstrip() + "\n" + after

              return text.rstrip() + "\n" + block


          def split_section_items(text, section_name):
              bounds = get_section_bounds(text, section_name)

              if not bounds:
                  return None

              section_abs_start, section_abs_end = bounds
              section_text = text[section_abs_start:section_abs_end]
              lines = section_text.splitlines(keepends=True)

              if not lines:
                  return None

              header = lines[0]
              body_lines = lines[1:]

              top_item_indent = None

              for line in body_lines:
                  match = re.match(r"^(\s*)-\s+", line)
                  if match:
                      top_item_indent = match.group(1)
                      break

              if top_item_indent is None:
                  top_item_indent = "  "

              item_start_pattern = re.compile(rf"^{re.escape(top_item_indent)}-\s+")

              preamble = []
              items = []
              current_item = []

              for line in body_lines:
                  if item_start_pattern.match(line):
                      if current_item:
                          items.append(current_item)
                      current_item = [line]
                  else:
                      if current_item:
                          current_item.append(line)
                      else:
                          preamble.append(line)

              if current_item:
                  items.append(current_item)

              return {
                  "section_abs_start": section_abs_start,
                  "section_abs_end": section_abs_end,
                  "header": header,
                  "preamble": preamble,
                  "items": items,
                  "top_item_indent": top_item_indent,
              }


          def item_has_identifier(item_text, id_key, identifier, top_item_indent):
              id_pattern = re.compile(
                  rf"(?m)^{re.escape(top_item_indent)}-\s*{re.escape(id_key)}:\s*{re.escape(identifier)}\s*$"
              )

              nested_id_pattern = re.compile(
                  rf"(?m)^\s*{re.escape(id_key)}:\s*{re.escape(identifier)}\s*$"
              )

              return bool(id_pattern.search(item_text) or nested_id_pattern.search(item_text))


          def remove_list_items_by_identifier(text, section_name, id_key, identifiers):
              identifiers = {str(x).strip() for x in identifiers if str(x).strip()}

              if not identifiers:
                  return text

              split = split_section_items(text, section_name)

              if not split:
                  return text

              before_section = text[:split["section_abs_start"]]
              after_section = text[split["section_abs_end"]:]
              header = split["header"]
              preamble = split["preamble"]
              items = split["items"]
              top_item_indent = split["top_item_indent"]

              kept_items = []

              for item_lines in items:
                  item_text = "".join(item_lines)
                  should_remove = False

                  for identifier in identifiers:
                      if item_has_identifier(item_text, id_key, identifier, top_item_indent):
                          should_remove = True
                          break

                  if not should_remove:
                      kept_items.append(item_lines)

              new_section_text = header + "".join(preamble) + "".join(
                  "".join(item) for item in kept_items
              )

              if not new_section_text.endswith("\n"):
                  new_section_text += "\n"

              return before_section + new_section_text + after_section


          def replace_list_item_by_identifier(text, section_name, id_key, identifier, replacement_item):
              split = split_section_items(text, section_name)

              if not split:
                  fail(f"Could not find top-level section: {section_name}")

              before_section = text[:split["section_abs_start"]]
              after_section = text[split["section_abs_end"]:]
              header = split["header"]
              preamble = split["preamble"]
              items = split["items"]
              top_item_indent = split["top_item_indent"]

              replacement_block = indent_block(dump_list_item_block(replacement_item), top_item_indent)

              replaced = False
              new_items = []

              for item_lines in items:
                  item_text = "".join(item_lines)

                  if item_has_identifier(item_text, id_key, identifier, top_item_indent):
                      new_items.append([replacement_block])
                      replaced = True
                  else:
                      new_items.append(item_lines)

              if not replaced:
                  fail(f"Could not find {section_name} item with {id_key}: {identifier}")

              new_section_text = header + "".join(preamble) + "".join(
                  "".join(item) for item in new_items
              )

              if not new_section_text.endswith("\n"):
                  new_section_text += "\n"

              return before_section + new_section_text + after_section


          if not CATALOG_PATH.exists():
              fail(f"Could not find {CATALOG_PATH}")

          issue_body = ISSUE_PATH.read_text(encoding="utf-8")
          catalog_text = CATALOG_PATH.read_text(encoding="utf-8")

          try:
              catalog = yaml.safe_load(catalog_text) or {}
          except Exception as exc:
              fail(f"Unable to parse {CATALOG_PATH}: {exc}")

          datasets = ensure_list_section(catalog, "datasets")
          concepts = ensure_list_section(catalog, "concepts")
          series = ensure_list_section(catalog, "series")
          distributions = ensure_list_section(catalog, "distributions")
          metrics = ensure_list_section(catalog, "metrics")
          quality_measurements = ensure_list_section(catalog, "qualityMeasurements")
          policies = ensure_list_section(catalog, "policies")

          dataset_ids = identifiers_in(datasets, "identifier")
          concept_ids = identifiers_in(concepts, "identifier")
          series_ids = identifiers_in(series, "identifier")
          distribution_ids = identifiers_in(distributions, "identifier")
          metric_ids = identifiers_in(metrics, "identifier")
          quality_measurement_ids = identifiers_in(quality_measurements, "identifier")
          policy_uids = identifiers_in(policies, "uid")

          is_add_dataset = str(os.environ.get("IS_ADD_DATASET", "")).lower() == "true"
          is_remove_dataset = str(os.environ.get("IS_REMOVE_DATASET", "")).lower() == "true"
          is_edit_dataset = str(os.environ.get("IS_EDIT_DATASET", "")).lower() == "true"
          is_add_concept = str(os.environ.get("IS_ADD_CONCEPT", "")).lower() == "true"
          is_remove_concept = str(os.environ.get("IS_REMOVE_CONCEPT", "")).lower() == "true"
          is_add_metric = str(os.environ.get("IS_ADD_METRIC", "")).lower() == "true"
          is_remove_metric = str(os.environ.get("IS_REMOVE_METRIC", "")).lower() == "true"
          is_add_quality_measurement = str(os.environ.get("IS_ADD_QUALITY_MEASUREMENT", "")).lower() == "true"
          is_remove_quality_measurement = str(os.environ.get("IS_REMOVE_QUALITY_MEASUREMENT", "")).lower() == "true"
          is_add_policy = str(os.environ.get("IS_ADD_POLICY", "")).lower() == "true"
          is_remove_policy = str(os.environ.get("IS_REMOVE_POLICY", "")).lower() == "true"
          is_add_lineage_link = str(os.environ.get("IS_ADD_LINEAGE_LINK", "")).lower() == "true"
          is_remove_lineage_link = str(os.environ.get("IS_REMOVE_LINEAGE_LINK", "")).lower() == "true"

          if (
              not is_add_dataset
              and not is_remove_dataset
              and not is_edit_dataset
              and not is_add_concept
              and not is_remove_concept
              and not is_add_metric
              and not is_remove_metric
              and not is_add_quality_measurement
              and not is_remove_quality_measurement
              and not is_add_policy
              and not is_remove_policy
              and not is_add_lineage_link
              and not is_remove_lineage_link
          ):
              if "### Dataset title" in issue_body and "### Dataset description" in issue_body:
                  is_add_dataset = True
              elif "### Confirm dataset removal" in issue_body and "### Reason for removal" in issue_body:
                  is_remove_dataset = True
              elif "### Confirm dataset edit" in issue_body and "### Dataset identifier" in issue_body:
                  is_edit_dataset = True
              elif "### Confirm concept addition" in issue_body and "### Preferred label" in issue_body:
                  is_add_concept = True
              elif "### Confirm concept removal" in issue_body and "### Concept identifier" in issue_body:
                  is_remove_concept = True
              elif "### Confirm metric addition" in issue_body and "### Metric definition" in issue_body:
                  is_add_metric = True
              elif "### Confirm metric removal" in issue_body and "### Metric identifier" in issue_body:
                  is_remove_metric = True
              elif "### Confirm quality measurement addition" in issue_body and "### Quality measurement value" in issue_body:
                  is_add_quality_measurement = True
              elif "### Confirm quality measurement removal" in issue_body and "### Quality measurement identifier" in issue_body:
                  is_remove_quality_measurement = True
              elif "### Confirm policy addition" in issue_body and "### Policy title" in issue_body:
                  is_add_policy = True
              elif "### Confirm policy removal" in issue_body and "### Policy UID" in issue_body:
                  is_remove_policy = True
              elif "### Confirm lineage link addition" in issue_body and "### Target dataset identifier" in issue_body:
                  is_add_lineage_link = True
              elif "### Confirm lineage link removal" in issue_body and "### Target dataset identifier" in issue_body:
                  is_remove_lineage_link = True

          active_modes = [
              is_add_dataset,
              is_remove_dataset,
              is_edit_dataset,
              is_add_concept,
              is_remove_concept,
              is_add_metric,
              is_remove_metric,
              is_add_quality_measurement,
              is_remove_quality_measurement,
              is_add_policy,
              is_remove_policy,
              is_add_lineage_link,
              is_remove_lineage_link,
          ]

          if sum(1 for mode in active_modes if mode) > 1:
              fail("Issue appears to match more than one supported intake form. Check labels.")

          if not any(active_modes):
              fail("Issue does not match a supported catalog intake form.")

          if is_add_lineage_link:
              target_dataset_identifier = extract_field(issue_body, "Target dataset identifier")
              source_dataset_identifier = extract_field(issue_body, "Source / input dataset identifier")
              confirmation = extract_field(issue_body, "Confirm lineage link addition")

              errors = []

              if not target_dataset_identifier:
                  errors.append("Missing required field: Target dataset identifier.")

              if not source_dataset_identifier:
                  errors.append("Missing required field: Source / input dataset identifier.")

              if "I confirm that this lineage link should be added to the catalog." not in confirmation:
                  errors.append("You must confirm lineage link addition by ticking the confirmation checkbox.")

              require_existing(target_dataset_identifier, dataset_ids, "Target dataset identifier", errors)
              require_existing(source_dataset_identifier, dataset_ids, "Source / input dataset identifier", errors)

              if target_dataset_identifier and source_dataset_identifier and target_dataset_identifier == source_dataset_identifier:
                  errors.append("A dataset cannot be derived from itself.")

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == target_dataset_identifier:
                      target_dataset = dataset
                      break

              existing_lineage = []

              if target_dataset is not None:
                  existing_lineage = as_list(target_dataset.get("wasDerivedFrom"))

                  if source_dataset_identifier in existing_lineage:
                      errors.append(
                          f"Lineage link already exists: {target_dataset_identifier} wasDerivedFrom {source_dataset_identifier}"
                      )

              if errors:
                  fail(errors)

              updated_dataset = copy.deepcopy(target_dataset)
              updated_dataset["wasDerivedFrom"] = existing_lineage + [source_dataset_identifier]

              catalog_text = replace_list_item_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  target_dataset_identifier,
                  updated_dataset
              )

              print(f"Added lineage link: {source_dataset_identifier} -> {target_dataset_identifier}")

          if is_remove_lineage_link:
              target_dataset_identifier = extract_field(issue_body, "Target dataset identifier")
              source_dataset_identifier = extract_field(issue_body, "Source / input dataset identifier")
              reason = extract_field(issue_body, "Reason for removal")
              confirmation = extract_field(issue_body, "Confirm lineage link removal")

              errors = []

              if not target_dataset_identifier:
                  errors.append("Missing required field: Target dataset identifier.")

              if not source_dataset_identifier:
                  errors.append("Missing required field: Source / input dataset identifier.")

              if not reason:
                  errors.append("Missing required field: Reason for removal.")

              if "I confirm that this lineage link should be removed from the catalog." not in confirmation:
                  errors.append("You must confirm lineage link removal by ticking the confirmation checkbox.")

              require_existing(target_dataset_identifier, dataset_ids, "Target dataset identifier", errors)
              require_existing(source_dataset_identifier, dataset_ids, "Source / input dataset identifier", errors)

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == target_dataset_identifier:
                      target_dataset = dataset
                      break

              existing_lineage = []

              if target_dataset is not None:
                  existing_lineage = as_list(target_dataset.get("wasDerivedFrom"))

                  if source_dataset_identifier not in existing_lineage:
                      errors.append(
                          f"Lineage link not found: {target_dataset_identifier} wasDerivedFrom {source_dataset_identifier}"
                      )

              if errors:
                  fail(errors)

              updated_dataset = copy.deepcopy(target_dataset)
              updated_lineage = [
                  lineage_identifier
                  for lineage_identifier in existing_lineage
                  if lineage_identifier != source_dataset_identifier
              ]

              if updated_lineage:
                  updated_dataset["wasDerivedFrom"] = updated_lineage
              else:
                  updated_dataset.pop("wasDerivedFrom", None)

              catalog_text = replace_list_item_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  target_dataset_identifier,
                  updated_dataset
              )

              print(f"Removed lineage link: {source_dataset_identifier} -> {target_dataset_identifier}")

          CATALOG_PATH.write_text(catalog_text, encoding="utf-8")

          try:
              yaml.safe_load(CATALOG_PATH.read_text(encoding="utf-8"))
          except Exception as exc:
              fail(f"Updated YAML is invalid: {exc}")
          PY

      - name: Comment on validation or update failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            let body = "Catalog intake failed. Check the Actions logs for the exact reason.";

            if (fs.existsSync("validation_errors.md")) {
              body = fs.readFileSync("validation_errors.md", "utf8");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      - name: Remove temporary files
        if: always()
        run: |
          rm -f issue.txt validation_errors.md

      - name: Show pending changes
        if: success()
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo ""
          echo "=== git diff -- data-catalog/data-catalog.yaml ==="
          git diff -- data-catalog/data-catalog.yaml

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            data-catalog/data-catalog.yaml
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          branch-suffix: timestamp
          delete-branch: true
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Source issue: #${{ github.event.issue.number }}

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
          labels: "catalog-intake-pr"
