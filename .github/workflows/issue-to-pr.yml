name: Issue to PR Debug

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: read

jobs:
  debug-issue-event:
    runs-on: ubuntu-latest

    steps:
      - name: Print event context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Event name: ${{ github.event_name }}"
          echo "Issue action: ${{ github.event.action }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Issue title:"
          echo "${{ github.event.issue.title }}"
          echo ""
          echo "Issue labels JSON:"
          echo '${{ toJson(github.event.issue.labels) }}'
          echo ""
          echo "Condition check - label contains add-dataset:"
          echo "${{ contains(toJson(github.event.issue.labels), 'add-dataset') }}"
          echo ""
          echo "Condition check - title contains [ADD DATASET]:"
          echo "${{ contains(github.event.issue.title, '[ADD DATASET]') }}"
          echo ""
          echo "Issue body:"
          cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
