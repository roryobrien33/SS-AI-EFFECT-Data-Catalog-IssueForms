                  fail(errors)

              catalog_text = remove_list_items_by_identifier(
                  catalog_text,
                  "qualityMeasurements",
                  "identifier",
                  [quality_measurement_identifier]
              )

              print(f"Removed quality measurement: {quality_measurement_identifier}")

          if is_add_policy:
              policy_uid = extract_field(issue_body, "Policy UID")
              title = extract_field(issue_body, "Policy title")
              description = extract_field(issue_body, "Policy description")

              permission_uid = extract_field(issue_body, "Permission UID")
              permission_description = extract_field(issue_body, "Permission description")
              permission_action = extract_field(issue_body, "Permission action")
              permission_assignees = extract_lines(issue_body, "Permission assignees")

              obligation_uid = extract_field(issue_body, "Obligation UID")
              obligation_description = extract_field(issue_body, "Obligation description")
              obligation_action = extract_field(issue_body, "Obligation action")
              obligation_assignees = extract_lines(issue_body, "Obligation assignees")

              confirmation = extract_field(issue_body, "Confirm policy addition")

              errors = []

              if not title:
                  errors.append("Missing required field: Policy title.")

              if not description:
                  errors.append("Missing required field: Policy description.")

              if "I confirm that this policy should be added to the catalog." not in confirmation:
                  errors.append("You must confirm policy addition by ticking the confirmation checkbox.")

              if any(marker in description for marker in ["uid:", "permission:", "obligation:", "policies:", "datasets:"]):
                  errors.append("Policy description must be plain text, not YAML. Do not paste a YAML example into the description field.")

              if title and not policy_uid:
                  policy_uid = f"plcy:{slugify(title)}"

              if policy_uid in policy_uids:
                  errors.append(f"Policy UID already exists: {policy_uid}")

              permission_fields = [
                  permission_uid,
                  permission_description,
                  permission_action,
                  "\n".join(permission_assignees),
              ]

              if any(str(value).strip() for value in permission_fields):
                  if not permission_uid:
                      errors.append("Permission UID is required when adding a permission.")
                  if not permission_description:
                      errors.append("Permission description is required when adding a permission.")
                  if not permission_action:
                      errors.append("Permission action is required when adding a permission.")
                  if not permission_assignees:
                      errors.append("At least one Permission assignee is required when adding a permission.")

              obligation_fields = [
                  obligation_uid,
                  obligation_description,
                  obligation_action,
                  "\n".join(obligation_assignees),
              ]

              if any(str(value).strip() for value in obligation_fields):
                  if not obligation_uid:
                      errors.append("Obligation UID is required when adding an obligation.")
                  if not obligation_description:
                      errors.append("Obligation description is required when adding an obligation.")
                  if not obligation_action:
                      errors.append("Obligation action is required when adding an obligation.")
                  if not obligation_assignees:
                      errors.append("At least one Obligation assignee is required when adding an obligation.")

              if errors:
                  fail(errors)

              policy = {
                  "uid": policy_uid,
                  "title": title,
                  "description": description,
              }

              if any(str(value).strip() for value in permission_fields):
                  policy["permission"] = [
                      {
                          "uid": permission_uid,
                          "description": permission_description,
                          "action": permission_action,
                          "assignee": permission_assignees,
                      }
                  ]

              if any(str(value).strip() for value in obligation_fields):
                  policy["obligation"] = [
                      {
                          "uid": obligation_uid,
                          "description": obligation_description,
                          "action": obligation_action,
                          "assignee": obligation_assignees,
                      }
                  ]

              policy_block = dump_list_item_block(policy)
              catalog_text = insert_block_into_top_level_section(
                  catalog_text,
                  "policies",
                  policy_block
              )

              print(f"Added policy: {policy_uid}")

          if is_remove_policy:
              policy_uid = extract_field(issue_body, "Policy UID")
              reason = extract_field(issue_body, "Reason for removal")
              confirmation = extract_field(issue_body, "Confirm policy removal")

              errors = []

              if not policy_uid:
                  errors.append("Missing required field: Policy UID.")

              if not reason:
                  errors.append("Missing required field: Reason for removal.")

              if "I confirm that this policy should be removed from the catalog." not in confirmation:
                  errors.append("You must confirm policy removal by ticking the confirmation checkbox.")

              target_policy = None

              for policy in policies:
                  if isinstance(policy, dict) and str(policy.get("uid", "")).strip() == policy_uid:
                      target_policy = policy
                      break

              if target_policy is None:
                  errors.append(f"Policy UID not found: {policy_uid}")

              referencing_datasets = []

              for dataset in datasets:
                  if not isinstance(dataset, dict):
                      continue

                  dataset_identifier = str(dataset.get("identifier", "")).strip()
                  dataset_title = str(dataset.get("title", "")).strip()
                  dataset_policy = str(dataset.get("hasPolicy", "")).strip()

                  if dataset_policy == policy_uid:
                      if dataset_title:
                          referencing_datasets.append(f"{dataset_identifier} ({dataset_title})")
                      else:
                          referencing_datasets.append(dataset_identifier)

              if referencing_datasets:
                  errors.append(
                      "Policy cannot be removed because it is still referenced by datasets: "
                      + ", ".join(referencing_datasets)
                      + ". Remove or replace this policy from those datasets first using the Edit Dataset form."
                  )

              if errors:
                  fail(errors)

              catalog_text = remove_list_items_by_identifier(
                  catalog_text,
                  "policies",
                  "uid",
                  [policy_uid]
              )

              print(f"Removed policy: {policy_uid}")

          if is_add_lineage_link:
              target_dataset_identifier = extract_field(issue_body, "Target dataset identifier")
              source_dataset_identifier = extract_field(issue_body, "Source / input dataset identifier")
              confirmation = extract_field(issue_body, "Confirm lineage link addition")

              errors = []

              if not target_dataset_identifier:
                  errors.append("Missing required field: Target dataset identifier.")

              if not source_dataset_identifier:
                  errors.append("Missing required field: Source / input dataset identifier.")

              if "I confirm that this lineage link should be added to the catalog." not in confirmation:
                  errors.append("You must confirm lineage link addition by ticking the confirmation checkbox.")

              require_existing(target_dataset_identifier, dataset_ids, "Target dataset identifier", errors)
              require_existing(source_dataset_identifier, dataset_ids, "Source / input dataset identifier", errors)

              if target_dataset_identifier and source_dataset_identifier and target_dataset_identifier == source_dataset_identifier:
                  errors.append("A dataset cannot be derived from itself.")

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == target_dataset_identifier:
                      target_dataset = dataset
                      break

              existing_lineage = []

              if target_dataset is not None:
                  existing_lineage = as_list(target_dataset.get("wasDerivedFrom"))

                  if source_dataset_identifier in existing_lineage:
                      errors.append(
                          f"Lineage link already exists: {target_dataset_identifier} wasDerivedFrom {source_dataset_identifier}"
                      )

              if errors:
                  fail(errors)

              updated_dataset = copy.deepcopy(target_dataset)
              updated_dataset["wasDerivedFrom"] = existing_lineage + [source_dataset_identifier]

              catalog_text = replace_list_item_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  target_dataset_identifier,
                  updated_dataset
              )

              print(f"Added lineage link: {source_dataset_identifier} -> {target_dataset_identifier}")

          if is_remove_lineage_link:
              target_dataset_identifier = extract_field(issue_body, "Target dataset identifier")
              source_dataset_identifier = extract_field(issue_body, "Source / input dataset identifier")
              reason = extract_field(issue_body, "Reason for removal")
              confirmation = extract_field(issue_body, "Confirm lineage link removal")

              errors = []

              if not target_dataset_identifier:
                  errors.append("Missing required field: Target dataset identifier.")

              if not source_dataset_identifier:
                  errors.append("Missing required field: Source / input dataset identifier.")

              if not reason:
                  errors.append("Missing required field: Reason for removal.")

              if "I confirm that this lineage link should be removed from the catalog." not in confirmation:
                  errors.append("You must confirm lineage link removal by ticking the confirmation checkbox.")

              require_existing(target_dataset_identifier, dataset_ids, "Target dataset identifier", errors)
              require_existing(source_dataset_identifier, dataset_ids, "Source / input dataset identifier", errors)

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == target_dataset_identifier:
                      target_dataset = dataset
                      break

              existing_lineage = []

              if target_dataset is not None:
                  existing_lineage = as_list(target_dataset.get("wasDerivedFrom"))

                  if source_dataset_identifier not in existing_lineage:
                      errors.append(
                          f"Lineage link not found: {target_dataset_identifier} wasDerivedFrom {source_dataset_identifier}"
                      )

              if errors:
                  fail(errors)

              updated_dataset = copy.deepcopy(target_dataset)
              updated_lineage = [
                  lineage_identifier
                  for lineage_identifier in existing_lineage
                  if lineage_identifier != source_dataset_identifier
              ]

              if updated_lineage:
                  updated_dataset["wasDerivedFrom"] = updated_lineage
              else:
                  updated_dataset.pop("wasDerivedFrom", None)

              catalog_text = replace_list_item_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  target_dataset_identifier,
                  updated_dataset
              )

              print(f"Removed lineage link: {source_dataset_identifier} -> {target_dataset_identifier}")

          CATALOG_PATH.write_text(catalog_text, encoding="utf-8")

          try:
              yaml.safe_load(CATALOG_PATH.read_text(encoding="utf-8"))
          except Exception as exc:
              fail(f"Updated YAML is invalid: {exc}")
          PY

      - name: Comment on validation or update failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            let body = "Catalog intake failed. Check the Actions logs for the exact reason.";

            if (fs.existsSync("validation_errors.md")) {
              body = fs.readFileSync("validation_errors.md", "utf8");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      - name: Remove temporary files
        if: always()
        run: |
          rm -f issue.txt validation_errors.md

      - name: Show pending changes
        if: success()
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo ""
          echo "=== git diff -- data-catalog/data-catalog.yaml ==="
          git diff -- data-catalog/data-catalog.yaml

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            data-catalog/data-catalog.yaml
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          branch-suffix: timestamp
          delete-branch: true
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Source issue: #${{ github.event.issue.number }}

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
          labels: "catalog-intake-pr"
