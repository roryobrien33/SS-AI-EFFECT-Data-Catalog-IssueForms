name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug-issue-event:
    runs-on: ubuntu-latest

    steps:
      - name: Print issue event debug information
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Event name: ${{ github.event_name }}"
          echo "Issue action: ${{ github.event.action }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo ""
          echo "Issue title:"
          echo "${{ github.event.issue.title }}"
          echo ""
          echo "Issue labels JSON:"
          echo '${{ toJson(github.event.issue.labels) }}'
          echo ""
          echo "Condition check - has add-dataset label:"
          echo "${{ contains(github.event.issue.labels.*.name, 'add-dataset') }}"
          echo ""
          echo "Condition check - has remove-dataset label:"
          echo "${{ contains(github.event.issue.labels.*.name, 'remove-dataset') }}"
          echo ""
          echo "Condition check - has edit-dataset label:"
          echo "${{ contains(github.event.issue.labels.*.name, 'edit-dataset') }}"
          echo ""
          echo "Body marker check - has Dataset identifier:"
          echo "${{ contains(github.event.issue.body, '### Dataset identifier') }}"
          echo ""
          echo "Body marker check - has Dataset title:"
          echo "${{ contains(github.event.issue.body, '### Dataset title') }}"
          echo ""
          echo "Body marker check - has Reason for removal:"
          echo "${{ contains(github.event.issue.body, '### Reason for removal') }}"
          echo ""
          echo "Body marker check - has Confirm dataset removal:"
          echo "${{ contains(github.event.issue.body, '### Confirm dataset removal') }}"
          echo ""
          echo "Body marker check - has Confirm dataset edit:"
          echo "${{ contains(github.event.issue.body, '### Confirm dataset edit') }}"
          echo ""
          echo "Full issue body:"
          cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF

  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'add-dataset') ||
      contains(github.event.issue.labels.*.name, 'remove-dataset') ||
      contains(github.event.issue.labels.*.name, 'edit-dataset') ||
      (
        contains(github.event.issue.body, '### Dataset identifier') &&
        contains(github.event.issue.body, '### Dataset title') &&
        contains(github.event.issue.body, '### Dataset description')
      ) ||
      (
        contains(github.event.issue.body, '### Dataset identifier') &&
        contains(github.event.issue.body, '### Reason for removal') &&
        contains(github.event.issue.body, '### Confirm dataset removal')
      ) ||
      (
        contains(github.event.issue.body, '### Dataset identifier') &&
        contains(github.event.issue.body, '### Confirm dataset edit')
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("issue.txt").write_text(
              os.environ.get("ISSUE_BODY", ""),
              encoding="utf-8"
          )
          PY

      - name: Parse issue form, validate catalog, and update YAML minimally
        env:
          IS_ADD_DATASET: ${{ contains(github.event.issue.labels.*.name, 'add-dataset') }}
          IS_REMOVE_DATASET: ${{ contains(github.event.issue.labels.*.name, 'remove-dataset') }}
          IS_EDIT_DATASET: ${{ contains(github.event.issue.labels.*.name, 'edit-dataset') }}
        run: |
          python - <<'PY'
          import copy
          import os
          import re
          import sys
          from pathlib import Path

          import yaml

          CATALOG_PATH = Path("data-catalog/data-catalog.yaml")
          ISSUE_PATH = Path("issue.txt")
          ERROR_PATH = Path("validation_errors.md")


          def fail(errors):
              if isinstance(errors, str):
                  errors = [errors]

              msg = (
                  "Catalog intake validation failed.\n\n"
                  + "\n".join(f"- {error}" for error in errors)
                  + "\n\nPlease edit the issue to fix these fields. The workflow will re-run after the issue is edited."
              )

              ERROR_PATH.write_text(msg, encoding="utf-8")
              print(msg)
              sys.exit(1)


          def clean_value(value):
              if value is None:
                  return ""

              value = str(value)

              value = (
                  value
                  .replace("\u200e", "")
                  .replace("\u200f", "")
                  .replace("\ufeff", "")
                  .replace("\u202a", "")
                  .replace("\u202b", "")
                  .replace("\u202c", "")
                  .replace("\u2066", "")
                  .replace("\u2067", "")
                  .replace("\u2068", "")
                  .replace("\u2069", "")
              )

              value = value.strip()

              if value in {"_No response_", "No response"}:
                  return ""

              return value


          def extract_field(body, label):
              pattern = rf"###\s+{re.escape(label)}\s*\n+(.*?)(?=\n###\s+|\Z)"
              match = re.search(pattern, body, re.DOTALL | re.IGNORECASE)

              if not match:
                  return ""

              return clean_value(match.group(1))


          def extract_lines(body, label):
              value = extract_field(body, label)

              if not value:
                  return []

              return [
                  clean_value(line)
                  for line in value.splitlines()
                  if clean_value(line) and clean_value(line) not in {"-", "*"}
              ]


          def slugify(value):
              value = str(value or "").lower().strip()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = re.sub(r"-+", "-", value).strip("-")
              return value or "dataset"


          def is_yes(value):
              return str(value or "").strip().lower() == "yes"


          def looks_like_url(value):
              if not value:
                  return True
              return value.startswith("http://") or value.startswith("https://")


          def looks_like_date(value):
              if not value:
                  return True
              return bool(re.match(r"^\d{4}-\d{2}-\d{2}$", value))


          def ensure_list_section(catalog, key):
              section = catalog.get(key, [])

              if section is None:
                  section = []

              if not isinstance(section, list):
                  fail(f"Expected top-level '{key}' to be a list.")

              return section


          def identifiers_in(section, id_key="identifier"):
              return {
                  str(item.get(id_key)).strip()
                  for item in section
                  if isinstance(item, dict) and item.get(id_key)
              }


          def as_list(value):
              if value is None:
                  return []

              if isinstance(value, list):
                  return [str(v).strip() for v in value if str(v).strip()]

              value = str(value).strip()
              return [value] if value else []


          def require_existing(reference, existing_ids, field_name, errors):
              if reference and reference not in existing_ids:
                  errors.append(f"{field_name} references missing identifier: {reference}")


          def require_all_existing(references, existing_ids, field_name, errors):
              missing = [ref for ref in references if ref not in existing_ids]

              if missing:
                  errors.append(
                      f"{field_name} references missing identifiers: {', '.join(missing)}"
                  )


          def dump_list_item_block(item):
              return yaml.safe_dump(
                  [item],
                  sort_keys=False,
                  allow_unicode=True,
                  width=1000,
                  default_flow_style=False,
              ).rstrip() + "\n"


          def get_section_bounds(text, section_name):
              header_pattern = re.compile(rf"^{re.escape(section_name)}:\s*$", re.MULTILINE)
              match = header_pattern.search(text)

              if not match:
                  return None

              section_start = match.end()
              next_header_pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*:\s*$", re.MULTILINE)
              next_match = next_header_pattern.search(text, section_start)

              if next_match:
                  return match.start(), next_match.start()

              return match.start(), len(text)


          def detect_section_list_indent(text, section_name):
              bounds = get_section_bounds(text, section_name)

              if not bounds:
                  return "  "

              section_abs_start, section_abs_end = bounds
              section_text = text[section_abs_start:section_abs_end]

              for line in section_text.splitlines():
                  match = re.match(r"^(\s*)-\s+", line)
                  if match:
                      return match.group(1)

              return "  "


          def indent_block(block, indent):
              lines = block.rstrip().splitlines()
              return "\n".join(
                  indent + line if line.strip() else line
                  for line in lines
              ) + "\n"


          def insert_block_into_top_level_section(text, section_name, block):
              header_pattern = re.compile(rf"^{re.escape(section_name)}:\s*$", re.MULTILINE)
              match = header_pattern.search(text)

              item_indent = detect_section_list_indent(text, section_name)
              block = indent_block(block, item_indent)

              if not match:
                  text = text.rstrip() + f"\n{section_name}:\n"
                  return text + block

              section_start = match.end()

              next_header_pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*:\s*$", re.MULTILINE)
              next_match = next_header_pattern.search(text, section_start)

              if next_match:
                  insert_pos = next_match.start()
                  before = text[:insert_pos].rstrip()
                  after = text[insert_pos:].lstrip("\n")
                  return before + "\n" + block.rstrip() + "\n" + after

              return text.rstrip() + "\n" + block


          def split_section_items(text, section_name):
              bounds = get_section_bounds(text, section_name)

              if not bounds:
                  return None

              section_abs_start, section_abs_end = bounds
              section_text = text[section_abs_start:section_abs_end]
              lines = section_text.splitlines(keepends=True)

              if not lines:
                  return None

              header = lines[0]
              body_lines = lines[1:]

              top_item_indent = None

              for line in body_lines:
                  match = re.match(r"^(\s*)-\s+", line)
                  if match:
                      top_item_indent = match.group(1)
                      break

              if top_item_indent is None:
                  top_item_indent = "  "

              item_start_pattern = re.compile(rf"^{re.escape(top_item_indent)}-\s+")

              preamble = []
              items = []
              current_item = []

              for line in body_lines:
                  if item_start_pattern.match(line):
                      if current_item:
                          items.append(current_item)
                      current_item = [line]
                  else:
                      if current_item:
                          current_item.append(line)
                      else:
                          preamble.append(line)

              if current_item:
                  items.append(current_item)

              return {
                  "section_abs_start": section_abs_start,
                  "section_abs_end": section_abs_end,
                  "header": header,
                  "preamble": preamble,
                  "items": items,
                  "top_item_indent": top_item_indent,
              }


          def item_has_identifier(item_text, id_key, identifier, top_item_indent):
              id_pattern = re.compile(
                  rf"(?m)^{re.escape(top_item_indent)}-\s*{re.escape(id_key)}:\s*{re.escape(identifier)}\s*$"
              )

              nested_id_pattern = re.compile(
                  rf"(?m)^\s*{re.escape(id_key)}:\s*{re.escape(identifier)}\s*$"
              )

              return bool(id_pattern.search(item_text) or nested_id_pattern.search(item_text))


          def remove_list_items_by_identifier(text, section_name, id_key, identifiers):
              identifiers = {str(x).strip() for x in identifiers if str(x).strip()}

              if not identifiers:
                  return text

              split = split_section_items(text, section_name)

              if not split:
                  return text

              before_section = text[:split["section_abs_start"]]
              after_section = text[split["section_abs_end"]:]
              header = split["header"]
              preamble = split["preamble"]
              items = split["items"]
              top_item_indent = split["top_item_indent"]

              kept_items = []

              for item_lines in items:
                  item_text = "".join(item_lines)
                  should_remove = False

                  for identifier in identifiers:
                      if item_has_identifier(item_text, id_key, identifier, top_item_indent):
                          should_remove = True
                          break

                  if not should_remove:
                      kept_items.append(item_lines)

              new_section_text = header + "".join(preamble) + "".join(
                  "".join(item) for item in kept_items
              )

              if not new_section_text.endswith("\n"):
                  new_section_text += "\n"

              return before_section + new_section_text + after_section


          def replace_list_item_by_identifier(text, section_name, id_key, identifier, replacement_item):
              split = split_section_items(text, section_name)

              if not split:
                  fail(f"Could not find top-level section: {section_name}")

              before_section = text[:split["section_abs_start"]]
              after_section = text[split["section_abs_end"]:]
              header = split["header"]
              preamble = split["preamble"]
              items = split["items"]
              top_item_indent = split["top_item_indent"]

              replacement_block = indent_block(dump_list_item_block(replacement_item), top_item_indent)

              replaced = False
              new_items = []

              for item_lines in items:
                  item_text = "".join(item_lines)

                  if item_has_identifier(item_text, id_key, identifier, top_item_indent):
                      new_items.append([replacement_block])
                      replaced = True
                  else:
                      new_items.append(item_lines)

              if not replaced:
                  fail(f"Could not find {section_name} item with {id_key}: {identifier}")

              new_section_text = header + "".join(preamble) + "".join(
                  "".join(item) for item in new_items
              )

              if not new_section_text.endswith("\n"):
                  new_section_text += "\n"

              return before_section + new_section_text + after_section


          if not CATALOG_PATH.exists():
              fail(f"Could not find {CATALOG_PATH}")

          issue_body = ISSUE_PATH.read_text(encoding="utf-8")
          catalog_text = CATALOG_PATH.read_text(encoding="utf-8")

          try:
              catalog = yaml.safe_load(catalog_text) or {}
          except Exception as exc:
              fail(f"Unable to parse {CATALOG_PATH}: {exc}")

          datasets = ensure_list_section(catalog, "datasets")
          concepts = ensure_list_section(catalog, "concepts")
          series = ensure_list_section(catalog, "series")
          distributions = ensure_list_section(catalog, "distributions")
          metrics = ensure_list_section(catalog, "metrics")
          quality_measurements = ensure_list_section(catalog, "qualityMeasurements")
          policies = ensure_list_section(catalog, "policies")

          dataset_ids = identifiers_in(datasets, "identifier")
          concept_ids = identifiers_in(concepts, "identifier")
          series_ids = identifiers_in(series, "identifier")
          distribution_ids = identifiers_in(distributions, "identifier")
          metric_ids = identifiers_in(metrics, "identifier")
          quality_measurement_ids = identifiers_in(quality_measurements, "identifier")
          policy_uids = identifiers_in(policies, "uid")

          is_add_dataset = str(os.environ.get("IS_ADD_DATASET", "")).lower() == "true"
          is_remove_dataset = str(os.environ.get("IS_REMOVE_DATASET", "")).lower() == "true"
          is_edit_dataset = str(os.environ.get("IS_EDIT_DATASET", "")).lower() == "true"

          if not is_add_dataset and not is_remove_dataset and not is_edit_dataset:
              if "### Dataset title" in issue_body and "### Dataset description" in issue_body:
                  is_add_dataset = True
              elif "### Confirm dataset removal" in issue_body and "### Reason for removal" in issue_body:
                  is_remove_dataset = True
              elif "### Confirm dataset edit" in issue_body and "### Dataset identifier" in issue_body:
                  is_edit_dataset = True

          active_modes = [is_add_dataset, is_remove_dataset, is_edit_dataset]

          if sum(1 for mode in active_modes if mode) > 1:
              fail("Issue appears to match more than one supported intake form. Check labels.")

          if not any(active_modes):
              fail("Issue does not match a supported catalog intake form.")

          if is_add_dataset:
              dataset_identifier = extract_field(issue_body, "Dataset identifier")
              dataset_title = extract_field(issue_body, "Dataset title")
              dataset_description = extract_field(issue_body, "Dataset description")
              publisher_name = extract_field(issue_body, "Publisher name")
              dataset_status = extract_field(issue_body, "Dataset status")
              license_value = extract_field(issue_body, "License title or URL")
              dataset_series_identifier = extract_field(issue_body, "Dataset series identifier")
              policy_uid = extract_field(issue_body, "Policy UID")
              theme_identifiers = extract_lines(issue_body, "Theme / concept identifiers")
              lineage_identifiers = extract_lines(issue_body, "Source / input dataset identifiers")

              add_distribution = extract_field(issue_body, "Add a distribution?")
              distribution_identifier = extract_field(issue_body, "Distribution identifier")
              distribution_format = extract_field(issue_body, "Distribution format")
              distribution_access_url = extract_field(issue_body, "Distribution access URL")
              distribution_issued = extract_field(issue_body, "Distribution issued date")

              add_quality = extract_field(issue_body, "Add data quality measurement?")
              quality_measurement_identifier = extract_field(issue_body, "Quality measurement identifier")
              metric_identifier = extract_field(issue_body, "Metric identifier")
              quality_measurement_value = extract_field(issue_body, "Quality measurement value")
              quality_measurement_date = extract_field(issue_body, "Quality measurement generated date")

              errors = []

              if not dataset_title:
                  errors.append("Missing required field: Dataset title.")

              if not dataset_description:
                  errors.append("Missing required field: Dataset description.")

              if not publisher_name:
                  errors.append("Missing required field: Publisher name.")

              if not license_value:
                  errors.append("Missing required field: License title or URL.")

              if dataset_title and not dataset_identifier:
                  dataset_identifier = f"ex:{slugify(dataset_title)}"

              if dataset_identifier in dataset_ids:
                  errors.append(
                      f"Dataset identifier already exists: {dataset_identifier}. Use the Edit Dataset form instead."
                  )

              require_all_existing(theme_identifiers, concept_ids, "Theme / concept identifiers", errors)
              require_existing(dataset_series_identifier, series_ids, "Dataset series identifier", errors)
              require_existing(policy_uid, policy_uids, "Policy UID", errors)
              require_all_existing(lineage_identifiers, dataset_ids, "Source / input dataset identifiers", errors)

              if is_yes(add_distribution):
                  if not distribution_identifier:
                      distribution_identifier = f"{dataset_identifier}-distribution"

                  if distribution_identifier in distribution_ids:
                      errors.append(f"Distribution identifier already exists: {distribution_identifier}")

                  if not distribution_format:
                      errors.append("Distribution format is required when 'Add a distribution?' is Yes.")

                  if not distribution_access_url:
                      errors.append("Distribution access URL is required when 'Add a distribution?' is Yes.")

                  if distribution_access_url and not looks_like_url(distribution_access_url):
                      errors.append("Distribution access URL must start with http:// or https://.")

                  if distribution_issued and not looks_like_date(distribution_issued):
                      errors.append("Distribution issued date must use YYYY-MM-DD format.")

              if is_yes(add_quality):
                  if not metric_identifier:
                      errors.append("Metric identifier is required when 'Add data quality measurement?' is Yes.")

                  require_existing(metric_identifier, metric_ids, "Metric identifier", errors)

                  if not quality_measurement_value:
                      errors.append("Quality measurement value is required when 'Add data quality measurement?' is Yes.")

                  if quality_measurement_value:
                      try:
                          quality_measurement_value_float = float(quality_measurement_value)
                      except ValueError:
                          errors.append("Quality measurement value must be numeric.")
                          quality_measurement_value_float = None
                  else:
                      quality_measurement_value_float = None

                  if quality_measurement_date and not looks_like_date(quality_measurement_date):
                      errors.append("Quality measurement generated date must use YYYY-MM-DD format.")

                  if not quality_measurement_identifier and dataset_identifier:
                      quality_measurement_identifier = f"{dataset_identifier}-quality-measurement"

                  if quality_measurement_identifier in quality_measurement_ids:
                      errors.append(
                          f"Quality measurement identifier already exists: {quality_measurement_identifier}"
                      )
              else:
                  quality_measurement_value_float = None

              if errors:
                  fail(errors)

              dataset = {
                  "identifier": dataset_identifier,
                  "title": dataset_title,
                  "description": dataset_description,
                  "publisher": {
                      "name": publisher_name
                  },
                  "license": {
                      "title": license_value
                  },
              }

              if dataset_status:
                  dataset["status"] = dataset_status

              if dataset_series_identifier:
                  dataset["inSeries"] = dataset_series_identifier

              if policy_uid:
                  dataset["hasPolicy"] = policy_uid

              if theme_identifiers:
                  dataset["theme"] = theme_identifiers

              if lineage_identifiers:
                  dataset["wasDerivedFrom"] = lineage_identifiers

              distribution = None

              if is_yes(add_distribution):
                  dataset["distribution"] = [distribution_identifier]

                  distribution = {
                      "identifier": distribution_identifier,
                      "format": distribution_format,
                      "accessURL": distribution_access_url,
                  }

                  if distribution_issued:
                      distribution["issued"] = distribution_issued

              quality_measurement = None

              if is_yes(add_quality):
                  quality_measurement = {
                      "identifier": quality_measurement_identifier,
                      "computedOn": dataset_identifier,
                      "isMeasurementOf": metric_identifier,
                      "value": quality_measurement_value_float,
                  }

                  if quality_measurement_date:
                      quality_measurement["generatedAtTime"] = quality_measurement_date

              dataset_block = dump_list_item_block(dataset)
              catalog_text = insert_block_into_top_level_section(catalog_text, "datasets", dataset_block)

              if distribution:
                  distribution_block = dump_list_item_block(distribution)
                  catalog_text = insert_block_into_top_level_section(
                      catalog_text,
                      "distributions",
                      distribution_block
                  )

              if quality_measurement:
                  quality_measurement_block = dump_list_item_block(quality_measurement)
                  catalog_text = insert_block_into_top_level_section(
                      catalog_text,
                      "qualityMeasurements",
                      quality_measurement_block
                  )

              print(f"Added dataset: {dataset_identifier}")

              if distribution:
                  print(f"Added distribution: {distribution_identifier}")

              if quality_measurement:
                  print(f"Added quality measurement: {quality_measurement_identifier}")

          if is_remove_dataset:
              dataset_identifier = extract_field(issue_body, "Dataset identifier")
              print(f"Remove requested for dataset identifier: {repr(dataset_identifier)}")

              reason = extract_field(issue_body, "Reason for removal")
              remove_distributions_answer = extract_field(issue_body, "Remove linked distributions?")
              remove_quality_measurements_answer = extract_field(issue_body, "Remove linked quality measurements?")
              confirmation = extract_field(issue_body, "Confirm dataset removal")

              errors = []

              if not dataset_identifier:
                  errors.append("Missing required field: Dataset identifier.")

              if not reason:
                  errors.append("Missing required field: Reason for removal.")

              if "I confirm that this dataset should be removed from the catalog." not in confirmation:
                  errors.append("You must confirm dataset removal by ticking the confirmation checkbox.")

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == dataset_identifier:
                      target_dataset = dataset
                      break

              if target_dataset is None:
                  errors.append(f"Dataset identifier not found: {dataset_identifier}")

              linked_distribution_ids = []
              linked_quality_measurement_ids = []

              if target_dataset is not None:
                  linked_distribution_ids = as_list(target_dataset.get("distribution"))

                  linked_quality_measurement_ids = [
                      str(qm.get("identifier")).strip()
                      for qm in quality_measurements
                      if isinstance(qm, dict)
                      and str(qm.get("computedOn", "")).strip() == dataset_identifier
                      and str(qm.get("identifier", "")).strip()
                  ]

              if linked_distribution_ids and not is_yes(remove_distributions_answer):
                  errors.append(
                      "Dataset has linked distributions. Select Yes for 'Remove linked distributions?' "
                      f"or remove them separately first. Linked distributions: {', '.join(linked_distribution_ids)}"
                  )

              if linked_quality_measurement_ids and not is_yes(remove_quality_measurements_answer):
                  errors.append(
                      "Dataset has linked quality measurements. Select Yes for 'Remove linked quality measurements?' "
                      f"or remove them separately first. Linked quality measurements: {', '.join(linked_quality_measurement_ids)}"
                  )

              if errors:
                  fail(errors)

              catalog_text = remove_list_items_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  [dataset_identifier]
              )

              if linked_distribution_ids and is_yes(remove_distributions_answer):
                  catalog_text = remove_list_items_by_identifier(
                      catalog_text,
                      "distributions",
                      "identifier",
                      linked_distribution_ids
                  )

              if linked_quality_measurement_ids and is_yes(remove_quality_measurements_answer):
                  catalog_text = remove_list_items_by_identifier(
                      catalog_text,
                      "qualityMeasurements",
                      "identifier",
                      linked_quality_measurement_ids
                  )

              print(f"Removed dataset: {dataset_identifier}")

              if linked_distribution_ids and is_yes(remove_distributions_answer):
                  print(f"Removed linked distributions: {', '.join(linked_distribution_ids)}")

              if linked_quality_measurement_ids and is_yes(remove_quality_measurements_answer):
                  print(f"Removed linked quality measurements: {', '.join(linked_quality_measurement_ids)}")

          if is_edit_dataset:
              dataset_identifier = extract_field(issue_body, "Dataset identifier")
              print(f"Edit requested for dataset identifier: {repr(dataset_identifier)}")

              new_title = extract_field(issue_body, "Dataset title")
              new_description = extract_field(issue_body, "Dataset description")
              new_publisher = extract_field(issue_body, "Publisher name")
              new_status = extract_field(issue_body, "Dataset status")
              new_license = extract_field(issue_body, "License title or URL")
              new_series = extract_field(issue_body, "Dataset series identifier")
              new_policy = extract_field(issue_body, "Policy UID")
              new_themes = extract_lines(issue_body, "Theme / concept identifiers")
              new_lineage = extract_lines(issue_body, "Source / input dataset identifiers")
              confirmation = extract_field(issue_body, "Confirm dataset edit")

              errors = []

              if not dataset_identifier:
                  errors.append("Missing required field: Dataset identifier.")

              if "I confirm that this dataset metadata should be updated." not in confirmation:
                  errors.append("You must confirm dataset edit by ticking the confirmation checkbox.")

              target_dataset = None

              for dataset in datasets:
                  if isinstance(dataset, dict) and str(dataset.get("identifier", "")).strip() == dataset_identifier:
                      target_dataset = dataset
                      break

              if target_dataset is None:
                  errors.append(f"Dataset identifier not found: {dataset_identifier}")

              supplied_fields = [
                  new_title,
                  new_description,
                  new_publisher,
                  new_status,
                  new_license,
                  new_series,
                  new_policy,
                  "\n".join(new_themes),
                  "\n".join(new_lineage),
              ]

              if not any(str(value).strip() for value in supplied_fields):
                  errors.append("No editable fields were provided. Fill at least one optional field to update the dataset.")

              require_existing(new_series, series_ids, "Dataset series identifier", errors)
              require_existing(new_policy, policy_uids, "Policy UID", errors)
              require_all_existing(new_themes, concept_ids, "Theme / concept identifiers", errors)

              lineage_ids_without_self = [lineage_id for lineage_id in new_lineage if lineage_id != dataset_identifier]
              require_all_existing(lineage_ids_without_self, dataset_ids, "Source / input dataset identifiers", errors)

              if dataset_identifier in new_lineage:
                  errors.append("A dataset cannot reference itself in Source / input dataset identifiers.")

              if errors:
                  fail(errors)

              updated_dataset = copy.deepcopy(target_dataset)

              if new_title:
                  updated_dataset["title"] = new_title

              if new_description:
                  updated_dataset["description"] = new_description

              if new_publisher:
                  updated_dataset["publisher"] = {
                      "name": new_publisher
                  }

              if new_status:
                  updated_dataset["status"] = new_status

              if new_license:
                  updated_dataset["license"] = {
                      "title": new_license
                  }

              if new_series:
                  updated_dataset["inSeries"] = new_series

              if new_policy:
                  updated_dataset["hasPolicy"] = new_policy

              if new_themes:
                  updated_dataset["theme"] = new_themes

              if new_lineage:
                  updated_dataset["wasDerivedFrom"] = new_lineage

              catalog_text = replace_list_item_by_identifier(
                  catalog_text,
                  "datasets",
                  "identifier",
                  dataset_identifier,
                  updated_dataset
              )

              print(f"Updated dataset: {dataset_identifier}")

          CATALOG_PATH.write_text(catalog_text, encoding="utf-8")

          try:
              yaml.safe_load(CATALOG_PATH.read_text(encoding="utf-8"))
          except Exception as exc:
              fail(f"Updated YAML is invalid: {exc}")
          PY

      - name: Comment on validation or update failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            let body = "Catalog intake failed. Check the Actions logs for the exact reason.";

            if (fs.existsSync("validation_errors.md")) {
              body = fs.readFileSync("validation_errors.md", "utf8");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      - name: Remove temporary files
        if: always()
        run: |
          rm -f issue.txt validation_errors.md

      - name: Show pending changes
        if: success()
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo ""
          echo "=== git diff -- data-catalog/data-catalog.yaml ==="
          git diff -- data-catalog/data-catalog.yaml

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            data-catalog/data-catalog.yaml
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          branch-suffix: timestamp
          delete-branch: true
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Source issue: #${{ github.event.issue.number }}

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
          labels: "catalog-intake-pr"
