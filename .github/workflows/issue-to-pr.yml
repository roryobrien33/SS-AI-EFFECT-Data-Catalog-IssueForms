name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'add-dataset') ||
      (
        contains(github.event.issue.body, '### Dataset identifier') &&
        contains(github.event.issue.body, '### Dataset title') &&
        contains(github.event.issue.body, '### Dataset description')
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("issue.txt").write_text(
              os.environ.get("ISSUE_BODY", ""),
              encoding="utf-8"
          )
          PY

      - name: Parse issue form, validate catalog, and insert YAML blocks
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          import yaml

          CATALOG_PATH = Path("data-catalog/data-catalog.yaml")
          ISSUE_PATH = Path("issue.txt")
          ERROR_PATH = Path("validation_errors.md")

          def fail(errors):
              if isinstance(errors, str):
                  errors = [errors]

              msg = (
                  "Catalog intake validation failed.\n\n"
                  + "\n".join(f"- {error}" for error in errors)
                  + "\n\nPlease edit the issue to fix these fields. The workflow will re-run after the issue is edited."
              )

              ERROR_PATH.write_text(msg, encoding="utf-8")
              print(msg)
              sys.exit(1)

          def clean_value(value):
              if value is None:
                  return ""

              value = str(value).strip()

              if value in {"_No response_", "No response"}:
                  return ""

              return value

          def extract_field(body, label):
              pattern = rf"###\s+{re.escape(label)}\s*\n+(.*?)(?=\n###\s+|\Z)"
              match = re.search(pattern, body, re.DOTALL | re.IGNORECASE)

              if not match:
                  return ""

              return clean_value(match.group(1))

          def extract_lines(body, label):
              value = extract_field(body, label)

              if not value:
                  return []

              return [
                  line.strip()
                  for line in value.splitlines()
                  if line.strip() and line.strip() not in {"-", "*"}
              ]

          def slugify(value):
              value = str(value or "").lower().strip()
              value = re.sub(r"[^a-z0-9]+", "-", value)
              value = re.sub(r"-+", "-", value).strip("-")
              return value or "dataset"

          def is_yes(value):
              return str(value or "").strip().lower() == "yes"

          def looks_like_url(value):
              if not value:
                  return True
              return value.startswith("http://") or value.startswith("https://")

          def looks_like_date(value):
              if not value:
                  return True
              return bool(re.match(r"^\d{4}-\d{2}-\d{2}$", value))

          def ensure_list_section(catalog, key):
              section = catalog.get(key, [])

              if section is None:
                  section = []

              if not isinstance(section, list):
                  fail(f"Expected top-level '{key}' to be a list.")

              return section

          def identifiers_in(section, id_key="identifier"):
              return {
                  str(item.get(id_key)).strip()
                  for item in section
                  if isinstance(item, dict) and item.get(id_key)
              }

          def require_existing(reference, existing_ids, field_name, errors):
              if reference and reference not in existing_ids:
                  errors.append(f"{field_name} references missing identifier: {reference}")

          def require_all_existing(references, existing_ids, field_name, errors):
              missing = [ref for ref in references if ref not in existing_ids]

              if missing:
                  errors.append(
                      f"{field_name} references missing identifiers: {', '.join(missing)}"
                  )

          def dump_list_item_block(item):
              """
              Dump only the new list item(s), not the whole catalog.
              This keeps PR diffs small.
              """
              return yaml.safe_dump(
                  [item],
                  sort_keys=False,
                  allow_unicode=True,
                  width=1000,
                  default_flow_style=False,
              ).rstrip() + "\n"

          def insert_block_into_top_level_section(text, section_name, block):
              """
              Insert a YAML list-item block into a top-level section without rewriting the file.

              Example target:

              datasets:
              - identifier: ex:existing

              The new block is inserted before the next top-level section.
              """
              header_pattern = re.compile(rf"^{re.escape(section_name)}:\s*$", re.MULTILINE)
              match = header_pattern.search(text)

              if not match:
                  text = text.rstrip() + f"\n{section_name}:\n"
                  return text + block

              section_start = match.end()

              next_header_pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*:\s*$", re.MULTILINE)
              next_match = next_header_pattern.search(text, section_start)

              if next_match:
                  insert_pos = next_match.start()
                  before = text[:insert_pos].rstrip()
                  after = text[insert_pos:].lstrip("\n")
                  return before + "\n" + block.rstrip() + "\n" + after

              return text.rstrip() + "\n" + block

          if not CATALOG_PATH.exists():
              fail(f"Could not find {CATALOG_PATH}")

          issue_body = ISSUE_PATH.read_text(encoding="utf-8")
          catalog_text = CATALOG_PATH.read_text(encoding="utf-8")

          try:
              catalog = yaml.safe_load(catalog_text) or {}
          except Exception as exc:
              fail(f"Unable to parse {CATALOG_PATH}: {exc}")

          datasets = ensure_list_section(catalog, "datasets")
          concepts = ensure_list_section(catalog, "concepts")
          series = ensure_list_section(catalog, "series")
          distributions = ensure_list_section(catalog, "distributions")
          metrics = ensure_list_section(catalog, "metrics")
          quality_measurements = ensure_list_section(catalog, "qualityMeasurements")
          policies = ensure_list_section(catalog, "policies")

          dataset_ids = identifiers_in(datasets, "identifier")
          concept_ids = identifiers_in(concepts, "identifier")
          series_ids = identifiers_in(series, "identifier")
          distribution_ids = identifiers_in(distributions, "identifier")
          metric_ids = identifiers_in(metrics, "identifier")
          quality_measurement_ids = identifiers_in(quality_measurements, "identifier")
          policy_uids = identifiers_in(policies, "uid")

          dataset_identifier = extract_field(issue_body, "Dataset identifier")
          dataset_title = extract_field(issue_body, "Dataset title")
          dataset_description = extract_field(issue_body, "Dataset description")
          publisher_name = extract_field(issue_body, "Publisher name")
          dataset_status = extract_field(issue_body, "Dataset status")
          license_value = extract_field(issue_body, "License title or URL")
          dataset_series_identifier = extract_field(issue_body, "Dataset series identifier")
          policy_uid = extract_field(issue_body, "Policy UID")
          theme_identifiers = extract_lines(issue_body, "Theme / concept identifiers")
          lineage_identifiers = extract_lines(issue_body, "Source / input dataset identifiers")

          add_distribution = extract_field(issue_body, "Add a distribution?")
          distribution_identifier = extract_field(issue_body, "Distribution identifier")
          distribution_format = extract_field(issue_body, "Distribution format")
          distribution_access_url = extract_field(issue_body, "Distribution access URL")
          distribution_issued = extract_field(issue_body, "Distribution issued date")

          add_quality = extract_field(issue_body, "Add data quality measurement?")
          quality_measurement_identifier = extract_field(issue_body, "Quality measurement identifier")
          metric_identifier = extract_field(issue_body, "Metric identifier")
          quality_measurement_value = extract_field(issue_body, "Quality measurement value")
          quality_measurement_date = extract_field(issue_body, "Quality measurement generated date")

          errors = []

          if not dataset_title:
              errors.append("Missing required field: Dataset title.")

          if not dataset_description:
              errors.append("Missing required field: Dataset description.")

          if not publisher_name:
              errors.append("Missing required field: Publisher name.")

          if not license_value:
              errors.append("Missing required field: License title or URL.")

          if dataset_title and not dataset_identifier:
              dataset_identifier = f"ex:{slugify(dataset_title)}"

          if dataset_identifier in dataset_ids:
              errors.append(
                  f"Dataset identifier already exists: {dataset_identifier}. Use the Edit Dataset form instead."
              )

          require_all_existing(theme_identifiers, concept_ids, "Theme / concept identifiers", errors)
          require_existing(dataset_series_identifier, series_ids, "Dataset series identifier", errors)
          require_existing(policy_uid, policy_uids, "Policy UID", errors)
          require_all_existing(lineage_identifiers, dataset_ids, "Source / input dataset identifiers", errors)

          if is_yes(add_distribution):
              if not distribution_identifier:
                  distribution_identifier = f"{dataset_identifier}-distribution"

              if distribution_identifier in distribution_ids:
                  errors.append(f"Distribution identifier already exists: {distribution_identifier}")

              if not distribution_format:
                  errors.append("Distribution format is required when 'Add a distribution?' is Yes.")

              if not distribution_access_url:
                  errors.append("Distribution access URL is required when 'Add a distribution?' is Yes.")

              if distribution_access_url and not looks_like_url(distribution_access_url):
                  errors.append("Distribution access URL must start with http:// or https://.")

              if distribution_issued and not looks_like_date(distribution_issued):
                  errors.append("Distribution issued date must use YYYY-MM-DD format.")

          if is_yes(add_quality):
              if not metric_identifier:
                  errors.append("Metric identifier is required when 'Add data quality measurement?' is Yes.")

              require_existing(metric_identifier, metric_ids, "Metric identifier", errors)

              if not quality_measurement_value:
                  errors.append("Quality measurement value is required when 'Add data quality measurement?' is Yes.")

              if quality_measurement_value:
                  try:
                      quality_measurement_value_float = float(quality_measurement_value)
                  except ValueError:
                      errors.append("Quality measurement value must be numeric.")
                      quality_measurement_value_float = None
              else:
                  quality_measurement_value_float = None

              if quality_measurement_date and not looks_like_date(quality_measurement_date):
                  errors.append("Quality measurement generated date must use YYYY-MM-DD format.")

              if not quality_measurement_identifier and dataset_identifier:
                  quality_measurement_identifier = f"{dataset_identifier}-quality-measurement"

              if quality_measurement_identifier in quality_measurement_ids:
                  errors.append(
                      f"Quality measurement identifier already exists: {quality_measurement_identifier}"
                  )
          else:
              quality_measurement_value_float = None

          if errors:
              fail(errors)

          dataset = {
              "identifier": dataset_identifier,
              "title": dataset_title,
              "description": dataset_description,
              "publisher": {
                  "name": publisher_name
              },
              "license": {
                  "title": license_value
              },
          }

          if dataset_status:
              dataset["status"] = dataset_status

          if dataset_series_identifier:
              dataset["inSeries"] = dataset_series_identifier

          if policy_uid:
              dataset["hasPolicy"] = policy_uid

          if theme_identifiers:
              dataset["theme"] = theme_identifiers

          if lineage_identifiers:
              dataset["wasDerivedFrom"] = lineage_identifiers

          distribution = None
          if is_yes(add_distribution):
              dataset["distribution"] = [distribution_identifier]

              distribution = {
                  "identifier": distribution_identifier,
                  "format": distribution_format,
                  "accessURL": distribution_access_url,
              }

              if distribution_issued:
                  distribution["issued"] = distribution_issued

          quality_measurement = None
          if is_yes(add_quality):
              quality_measurement = {
                  "identifier": quality_measurement_identifier,
                  "computedOn": dataset_identifier,
                  "isMeasurementOf": metric_identifier,
                  "value": quality_measurement_value_float,
              }

              if quality_measurement_date:
                  quality_measurement["generatedAtTime"] = quality_measurement_date

          dataset_block = dump_list_item_block(dataset)
          catalog_text = insert_block_into_top_level_section(catalog_text, "datasets", dataset_block)

          if distribution:
              distribution_block = dump_list_item_block(distribution)
              catalog_text = insert_block_into_top_level_section(
                  catalog_text,
                  "distributions",
                  distribution_block
              )

          if quality_measurement:
              quality_measurement_block = dump_list_item_block(quality_measurement)
              catalog_text = insert_block_into_top_level_section(
                  catalog_text,
                  "qualityMeasurements",
                  quality_measurement_block
              )

          CATALOG_PATH.write_text(catalog_text, encoding="utf-8")

          print(f"Added dataset: {dataset_identifier}")

          if distribution:
              print(f"Added distribution: {distribution_identifier}")

          if quality_measurement:
              print(f"Added quality measurement: {quality_measurement_identifier}")
          PY

      - name: Comment on validation or update failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            let body = "Catalog intake failed. Check the Actions logs for the exact reason.";

            if (fs.existsSync("validation_errors.md")) {
              body = fs.readFileSync("validation_errors.md", "utf8");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      - name: Show pending changes
        if: success()
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo ""
          echo "=== git diff -- data-catalog/data-catalog.yaml ==="
          git diff -- data-catalog/data-catalog.yaml

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            data-catalog/data-catalog.yaml
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          delete-branch: true
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Source issue: #${{ github.event.issue.number }}

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
