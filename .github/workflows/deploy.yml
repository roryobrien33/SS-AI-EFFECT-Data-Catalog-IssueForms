name: Build & Deploy Data Catalog

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v3
        with:
          python-version: "3.12.7"

      # ✅ Cache Python dependencies (uv)
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv 0.7.8
        run: curl -LsSf https://astral.sh/uv/0.7.8/install.sh | sh

      # ✅ Auto-handle lockfile (no user action required)
      - name: Sync Python dependencies
        run: |
          uv sync --no-dev --no-install-project --locked || (
            echo "Lockfile out of date, regenerating automatically..." &&
            uv lock &&
            uv sync --no-dev --no-install-project
          )

      - name: Generate Data Catalog
        run: |
          chmod +x scripts/generate-datacatalog.sh
          ./scripts/generate-datacatalog.sh

      # ✅ SIMPLE node setup (no cache → avoids error)
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install Antora with extensions
        run: npm install antora @antora/lunr-extension @sntke/antora-mermaid-extension

      - name: Generate Site
        run: npx antora antora-playbook.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
