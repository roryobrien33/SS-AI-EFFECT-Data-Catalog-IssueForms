policies:
  - uid: plcy:open-information
    title: Open Information Policy
    description: "Data classified as \"Open Information\" is intended to be freely available \nand accessible to anyone without restrictions. This type of data generally \ndoes not contain sensitive information and can be shared both within and \noutside the organization.\nComplies with FAIR principles: Findable, Accessible, Interoperable, Reusable.\n"
    permission:
      - uid: plcy:open-info-access
        description: 'Allows any consumer to access the data without restriction.

          '
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:open-register
        description: "The creator or owner must register the information in an indexed catalog \nso consumers can find it.\n"
        action: register
        assignee:
          - Data Provider
      - uid: plcy:open-license
        description: "The owner or creator must provide an open source or Creative Commons \nlicense describing the conditions under which a consumer may use the information.\n"
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:open-rights
        description: "The owner must provide a rights statement describing any IP or copyright \nthat the owner and/or anyone else holds over the information.\n"
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:open-make-accessible
        description: 'Providers must make the information available through an appropriate protocol.

          '
        action: make_available
        assignee:
          - Data Provider
  - uid: plcy:internal-information
    title: Internal Information Policy
    description: "Data classified as \"Internal Information\" is intended for use only within \nthe project. While this data may not be considered highly sensitive, it is \nstill restricted to employees or authorized personnel.\n"
    permission:
      - uid: plcy:internal-access
        description: "Allows project members to access the data. Consumers outside the project \ndo not have access unless agreed upon by the owner.\n"
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:internal-store
        description: "Creators must save their information in the appropriate folders in the \nfile sharing infrastructure available to the project.\n"
        action: store
        assignee:
          - Data Provider
      - uid: plcy:internal-agreement
        description: "If the owner decides to share information with non-project members, \nappropriate arrangements must be made with the provider.\n"
        action: share
        assignee:
          - Data Provider
  - uid: plcy:restricted-information
    title: Restricted Information Policy
    description: "Data classified as \"Restricted Information\" contains information that requires \na higher level of protection due to its sensitivity. Access to this data is \nlimited to specific individuals or groups based on their role within the project.\nUnlike internal information, restricted information is meant for sharing with \nthose that have received explicit permission.\n"
    permission:
      - uid: plcy:restricted-access
        description: 'Only consumers with whom the owner has a data sharing agreement have access.

          '
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:restricted-agreement
        description: "The owner must provide a data sharing agreement stating addressing rights, \nlicensing, and use limitations. Any consumer wishing access must agree \nto this agreement.\n"
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:restricted-environment
        description: 'The provider must provide an access-controlled environment for restricted data.

          '
        action: provide
        assignee:
          - Service Provider
  - uid: plcy:personal-information
    title: Personal Information Policy
    description: "Data classified as \"Personal Information\" falls under the GDPR. This includes \nany data that can be used to identify, contact, or locate a single person.\nAccess must be granted in compliance with GDPR and limited to those consumers \nthat fall under the conditions laid out in GDPR Article 6.\n"
    permission:
      - uid: plcy:personal-access
        description: 'Access is granted only to consumers/users that comply with GDPR conditions.

          '
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:personal-minimize
        description: "Collection of personal data must be minimized. All personal data must be \ndeleted before the termination of the project.\n"
        action: delete
        assignee:
          - Data Provider
      - uid: plcy:personal-subject-rights
        description: "The provider must allow subjects of Personal Information to claim their \nGDPR rights: Right of access, Right to rectification, Right to erasure.\n"
        action: allow
        assignee:
          - Service Provider
      - uid: plcy:personal-purpose
        description: "The owner and creator must clearly state the purpose limitation with which \nthe information was collected. Personal Information may only be shared if \nthe subject has given permission.\n"
        action: provide
        assignee:
          - Data Provider
  - uid: plcy:ai-reporting
    title: AI for Reporting Policy
    description: "Applies when AI is used for reporting or dissemination activities (text, images, \nvideo or other media). Here, AI is not used for primary research activities, \njust for reporting on them.\n"
    obligation:
      - uid: plcy:ai-reporting-attribution
        description: "If the artifact was entirely created using AI, attribution must state: \n\"This [material/visual/text/...] was (in part) generated using AI. \nIt was generated using [model name]+[model version] at [date]\".\n"
        action: provide
        assignee:
          - Data Provider
  - uid: plcy:ai-using
    title: Using AI Policy
    description: "Applies when AI is used for creating research artifacts or generating data. \nIn this case, AI has been used during the research itself.\n"
    obligation:
      - uid: plcy:ai-using-provenance
        description: "Must provide provenance conforming to the prov-o standard, including:\n- The Activity (the run of the AI system) that produced the dataset, \n  including when the Activity took place\n- The AI system, including its version\n- The input data(sets), including any prompts or configurations \n  like 'temperature' that the AI system used to produce the result.\n"
        action: provide
        assignee:
          - Data Provider
  - uid: plcy:ai-creating
    title: Creating AI Policy
    description: "Applies when the research focuses on creating an AI system as defined by the \nEU AI Act. The trained AI model needs to be published with corresponding metadata.\nIn case of conflicts with other classifications, the most stringent applies.\n"
    obligation:
      - uid: plcy:ai-creating-training-data
        description: 'Must publish the training dataset used to develop the AI system.

          '
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-validation-data
        description: 'Must publish the validation dataset used for testing the validity of the model.

          '
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-prompt-logs
        description: 'Must publish prompt-response logs that register the models inputs and outputs.

          '
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-documentation
        description: "Must publish architectural documentation addressing:\n- Written strategy for regulatory compliance and conformity assessment\n- Procedures used in the development of the AI system and procedures \n  for quality control and quality assurance\n- Examination, test and validation procedures to be carried out before, \n  during and after the deployment of the system\n- Documentation of the systems and procedures used for data collection, \n  data analysis and labelling of training data\n- A risk management system that addresses foreseeable risks including \n  safety risks and fundamental rights risks\n"
        action: provide
        assignee:
          - Data Provider
